name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # FIRST-PUBLISH BOOTSTRAP (per .ai/knowledge/publishing.md §"Bootstrapping a
      # brand-new package"): npm won't let you configure a Trusted Publisher for a
      # package that doesn't exist yet, so the very first publish authenticates with
      # a short-lived NPM_TOKEN repo secret. Provenance is still signed via OIDC
      # (id-token: write). AFTER 0.1.0 lands + a Trusted Publisher is added on
      # npmjs.com, delete the `env:` block below + revoke the token → pure OIDC.
      # npm pinned to 11.18.0: npm@latest (12.0.0) breaks --provenance ("Cannot
      # find module 'sigstore'").
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx -y npm@11.18.0 publish --provenance --access public
