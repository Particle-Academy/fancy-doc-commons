name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) — no token. A Trusted Publisher for this package +
      # workflow is configured on npmjs.com (the 0.1.0 bootstrap token has been
      # revoked). npm pinned to 11.18.0: npm@latest (12.0.0) breaks --provenance
      # ("Cannot find module 'sigstore'").
      - name: Publish
        run: npx -y npm@11.18.0 publish --provenance --access public
